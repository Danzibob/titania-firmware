[target.'cfg(all(target_arch = "arm", target_os = "none"))']
# replace your chip as listed in `probe-rs chip list`
runner = "probe-rs run --chip STM32L072CB"
# runner = "teleprobe client run --target nucleo-stm32l073rz -s "

[build]
target = "thumbv6m-none-eabi"
rustflags = [
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]


[env]
DEFMT_LOG = "trace"

